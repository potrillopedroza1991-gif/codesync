<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodeSync Pro - Ninja Ultimate</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
        :root {
            --bg-dark: #0d1117;
            --bg-sidebar: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            
            /* DIFERENCIACIÓN DE USUARIOS */
            --me-blue: #1f6feb;      
            --me-bg: #051d33;        
            --other-gray: #8b949e;   
            --other-bg: #21262d;     
            
            --neon-green: #2ecc71;
            --danger: #f85149;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; display: flex; }

        /* --- LOGIN NINJA --- */
        #login-screen {
            position: absolute; width: 100%; height: 100%; background: var(--bg-dark);
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .ninja-logo { font-size: 85px; color: var(--me-blue); margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(31, 111, 235, 0.4)); }
        #login-screen h2 { font-size: 35px; margin-bottom: 30px; font-weight: 900; letter-spacing: -1px; color: white; }
        
        .login-box { background: var(--bg-sidebar); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 360px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.6); }
        .login-box input { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-dark); color: white; outline: none; font-size: 16px; }
        .login-box input:focus { border-color: var(--me-blue); }
        .btn-login { width: 100%; padding: 16px; background: var(--me-blue); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-login:hover { transform: translateY(-2px); background: #388bfd; box-shadow: 0 5px 15px rgba(31, 111, 235, 0.3); }

        /* --- INTERFAZ --- */
        #app-screen { display: none; width: 100vw; height: 100vh; flex-direction: row; }

        /* SIDEBAR (PROYECTOS) */
        .sidebar { width: 320px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-list { flex: 1; overflow-y: auto; padding: 12px; }
        .chat-item { 
            padding: 15px; border-radius: 14px; margin-bottom: 10px; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center; transition: 0.2s; border: 1px solid transparent;
        }
        .chat-item:hover { background: rgba(255,255,255,0.05); }
        .chat-item.activo { background: rgba(31, 111, 235, 0.12); border-color: var(--me-blue); color: white; }
        .chat-actions { display: flex; gap: 12px; opacity: 0; }
        .chat-item:hover .chat-actions { opacity: 1; }

        /* --- CHAT AREA --- */
        .main-chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 20px 30px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border); font-weight: bold; font-size: 20px; color: white; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        #chat-area { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 30px; }

        /* BURBUJAS MODERNAS */
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.other { justify-content: flex-start; }

        .bubble { max-width: 85%; border-radius: 20px; overflow: hidden; border: 1px solid; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        
        .me .bubble { border-color: var(--me-blue); background: var(--me-bg); border-bottom-right-radius: 4px; }
        .me .bar-action { background: rgba(31, 111, 235, 0.15); color: #fff; }
        
        .other .bubble { border-color: #444; background: var(--other-bg); border-bottom-left-radius: 4px; }
        .other .bar-action { background: rgba(255,255,255,0.05); color: var(--other-gray); }

        .bar-action { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 800; letter-spacing: 0.5px; }
        .code-header { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .code-footer { border-top: 1px solid rgba(255,255,255,0.05); }

        .btn-copy { 
            background: var(--me-blue); color: white; border: none; padding: 6px 14px; 
            border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .btn-copy:hover { transform: scale(1.05); }
        .btn-copy.copiado { background: var(--neon-green) !important; color: white !important; cursor: default; }

        /* CONTENEDOR DE CÓDIGO */
        pre { padding: 20px; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; overflow-x: auto; color: #e6edf3; margin: 0; max-height: 450px; background: #010409; cursor: cell; }

        /* INPUT AREA */
        .input-area { padding: 25px 30px; background: var(--bg-sidebar); border-top: 1px solid var(--border); display: flex; gap: 15px; flex-shrink: 0; }
        textarea { flex: 1; height: 65px; background: #010409; border: 1px solid var(--border); border-radius: 14px; padding: 15px; color: white; resize: none; outline: none; font-family: 'Consolas', monospace; }
        textarea:focus { border-color: var(--me-blue); }
        .btn-send { width: 70px; flex-shrink: 0; background: var(--me-blue); color: white; border: none; border-radius: 14px; cursor: pointer; font-size: 24px; transition: 0.3s; display: flex; justify-content: center; align-items: center;}
        .btn-send:hover { transform: scale(1.05); background: #388bfd; }

        /* IDENTITY SWITCH */
        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); }
        .btn-identity { width: 100%; padding: 15px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-identity.active-me { border-color: var(--me-blue); color: var(--me-blue); background: rgba(31, 111, 235, 0.05); }
        .btn-identity.active-other { border-color: var(--other-gray); color: var(--other-gray); }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        /* =========================================
           MAGIA MÓVIL (CORRECCIÓN DE ANDROID) 
           ========================================= */
        @media (max-width: 768px) {
            body { height: 100dvh; } /* Ajuste clave para teclados en Android */
            
            #app-screen { 
                flex-direction: column; 
            }
            
            /* El panel de proyectos arriba */
            .sidebar { 
                width: 100%; 
                height: auto; 
                border-right: none; 
                border-bottom: 1px solid var(--border); 
                flex-shrink: 0; /* Evita que el celular lo aplaste */
            }
            
            .sidebar-header { padding: 15px; }
            .sidebar-header h3 { font-size: 16px; }
            
            .chat-list { 
                display: flex; 
                flex-direction: row; 
                overflow-x: auto; 
                overflow-y: hidden; 
                padding: 10px; 
                gap: 10px; 
            }
            
            .chat-item { margin-bottom: 0; white-space: nowrap; padding: 10px 15px; }
            
            /* Ajustes del cuadro de chat */
            .chat-header { padding: 15px; font-size: 16px; }
            #chat-area { padding: 15px; gap: 20px; }
            .bubble { max-width: 95%; }
            pre { font-size: 12px; padding: 15px; }
            
            /* LA SOLUCIÓN DEL BOTÓN DE ENVIAR (INAMOVIBLE) */
            .input-area { 
                padding: 10px; 
                gap: 10px; 
                flex-shrink: 0; /* Obliga al sistema a dejar este espacio fijo */
                min-height: 70px;
                padding-bottom: 15px;
            }
            
            textarea { 
                height: 50px; 
                padding: 12px; 
                font-size: 14px; 
                flex: 1; /* Ocupa el espacio sin empujar al botón */
                min-width: 0; /* Evita que crezca más de la cuenta */
            }
            
            .btn-send { 
                min-width: 55px; /* Tamaño blindado para Android */
                width: 55px;
                flex-shrink: 0; /* Prohíbe que el botón se haga más chico */
                font-size: 20px; 
            }
            
            .login-box { width: 90%; padding: 25px; }
            .ninja-logo { font-size: 60px; }
            #login-screen h2 { font-size: 28px; }
            
            .chat-actions { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <i class="fa-solid fa-user-ninja ninja-logo"></i>
        <h2>CodeSync Pro</h2>
        <div class="login-box">
            <input type="text" id="user" placeholder="Usuario" autocomplete="off">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn-login" onclick="iniciarSesion()">ACCESO NINJA</button>
            <p id="error-msg" style="color: var(--danger); display: none; margin-top: 15px; font-weight: bold;">ACCESO DENEGADO</p>
        </div>
    </div>

    <div id="app-screen" style="display: none; width: 100%;">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fa-solid fa-folder-tree"></i> PROYECTOS</h3>
                <button onclick="crearChat()" style="background:none; border:none; color:var(--me-blue); cursor:pointer; font-size:22px;"><i class="fa-solid fa-circle-plus"></i></button>
            </div>
            <div id="chat-list" class="chat-list"></div>
            <div class="sidebar-footer">
                <button id="id-btn" class="btn-identity" onclick="switchearUsuario()">🧑‍💻 1 (Móvil)</button>
            </div>
        </aside>

        <main class="main-chat">
            <div class="chat-header">
                <i class="fa-solid fa-terminal" style="color: var(--me-blue);"></i>
                <span id="chat-title">Selecciona un proyecto</span>
            </div>
            <div id="chat-area"></div>
            <div class="input-area">
                <textarea id="code-input" placeholder=">> Pega tu código aquí bro..."></textarea>
                <button class="btn-send" onclick="enviarMensaje()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>
    </div>

  <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // TUS LLAVES REALES DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyC-P9pWyDplTUKn8NT6woktwddJVRdqKZ0",
            authDomain: "codesync-pro.firebaseapp.com",
            databaseURL: "https://codesync-pro-default-rtdb.firebaseio.com/",
            projectId: "codesync-pro",
            storageBucket: "codesync-pro.firebasestorage.app",
            messagingSenderId: "203653670692",
            appId: "1:203653670692:web:3036fb810b68027a62b5b1",
            measurementId: "G-LBTNFPX6BX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- BASE DE DATOS Y ESTADO ---
        let currentUser = "potrillo";
        let chatActivo = null;
        let chats = []; // Ya NO usamos localStorage, usamos la nube

        // --- 1. ACCESO NINJA ---
        window.iniciarSesion = function() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim();
            
            if ((u === 'potrillo' || u === 'potrillo2') && p === '12345') {
                currentUser = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                arrancarSistema();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        };

        // --- 2. GESTIÓN DE PROYECTOS (CONECTADO A FIREBASE) ---
        function arrancarSistema() {
            actualizarBotonUsuario();
            
            // ESCUCHAMOS A FIREBASE EN TIEMPO REAL
            onValue(ref(db, 'proyectos'), (snapshot) => {
                const data = snapshot.val();
                chats = data ? data : [];
                
                if (chats.length === 0) {
                    // Si la nube está vacía, creamos el primero
                    chats.push({ id: Date.now(), nombre: "Proyecto Alpha", mensajes: [] });
                    guardar();
                } else {
                    renderizarLista();
                    // Restauramos el chat activo
                    if (chatActivo && chats.find(c => c.id === chatActivo)) {
                        window.abrirChat(chatActivo);
                    } else {
                        window.abrirChat(chats[0].id);
                    }
                }
            });
        }

        window.crearChat = function() {
            const nombre = prompt("> Nombre del nuevo script:");
            if (nombre) {
                const nuevo = { id: Date.now(), nombre: nombre, mensajes: [] };
                chats.push(nuevo);
                chatActivo = nuevo.id; 
                guardar();
            }
        };

        window.renombrar = function(id, e) {
            e.stopPropagation();
            const chat = chats.find(c => c.id === id);
            const nuevo = prompt("> Nuevo nombre del proyecto:", chat.nombre);
            if (nuevo && nuevo !== chat.nombre) {
                chat.nombre = nuevo;
                guardar();
            }
        };

        window.borrar = function(id, e) {
            e.stopPropagation();
            if (confirm("¿Seguro que quieres eliminar este proyecto, bro?")) {
                chats = chats.filter(c => c.id !== id);
                if (chats.length === 0) chats.push({ id: Date.now(), nombre: "General", mensajes: [] });
                chatActivo = chats[0].id;
                guardar();
            }
        };

        function renderizarLista() {
            const lista = document.getElementById('chat-list');
            lista.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === chatActivo ? 'activo' : ''}`;
                div.innerHTML = `
                    <span><i class="fa-solid fa-code"></i> ${chat.nombre}</span>
                    <div class="chat-actions">
                        <button onclick="renombrar(${chat.id}, event)" style="background:none; border:none; color:white; cursor:pointer;"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="borrar(${chat.id}, event)" style="background:none; border:none; color:var(--danger); cursor:pointer;"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
                div.onclick = () => window.abrirChat(chat.id);
                lista.appendChild(div);
            });
        }

        // --- 3. LÓGICA DEL CHAT ---
        window.abrirChat = function(id) {
            chatActivo = id;
            
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('activo'));
            const chatObj = chats.find(c => c.id === id);
            
            if(!chatObj) return;

            document.getElementById('chat-title').innerText = chatObj.nombre;
            
            const area = document.getElementById('chat-area');
            area.innerHTML = '';
            
            if(chatObj.mensajes) {
                chatObj.mensajes.forEach(msg => inyectarMsg(msg));
            }
            area.scrollTop = area.scrollHeight;
        };

        window.enviarMensaje = function() {
            const input = document.getElementById('code-input');
            const code = input.value.trim();
            if (!code || !chatActivo) return;

            const chatObj = chats.find(c => c.id === chatActivo);
            if(!chatObj.mensajes) chatObj.mensajes = [];

            const nuevoMsg = {
                idMsg: 'code-' + Date.now(),
                autor: currentUser,
                codigo: code,
                copiado: false
            };
            
            chatObj.mensajes.push(nuevoMsg);
            guardar(); // Al guardar en Firebase, se sincronizan todas las pantallas
            input.value = '';
        };

        function inyectarMsg(msg) {
            const area = document.getElementById('chat-area');
            const isMe = msg.autor === currentUser;
            const sideClass = isMe ? 'me' : 'other';
            
            const copyClass = msg.copiado ? 'btn-copy copiado' : 'btn-copy';
            const copyText = msg.copiado ? '<i class="fa-solid fa-check-double"></i> COPIADO' : '<i class="fa-regular fa-copy"></i> COPIAR';

            const html = `
                <div class="msg-row ${sideClass}" id="row-${msg.idMsg}">
                    <div class="bubble">
                        <div class="bar-action code-header">
                            <span><i class="fa-solid fa-microchip"></i> ${msg.autor.toUpperCase()}</span>
                            <button class="${copyClass}" onclick="copiarTodo('${msg.idMsg}')">${copyText}</button>
                        </div>
                        <pre id="${msg.idMsg}" ondblclick="copiarTodo('${msg.idMsg}')">${escapar(msg.codigo)}</pre>
                        <div class="bar-action code-footer">
                            <span>LINEAS: ${msg.codigo.split('\n').length}</span>
                            <button class="${copyClass}" onclick="copiarTodo('${msg.idMsg}')">${copyText}</button>
                        </div>
                    </div>
                </div>
            `;
            area.insertAdjacentHTML('beforeend', html);
        }

        // --- 4. COPIADO DUAL SINCRONIZADO ---
        window.copiarTodo = function(idHTML) {
            const texto = document.getElementById(idHTML).innerText;
            navigator.clipboard.writeText(texto).then(() => {
                const chatObj = chats.find(c => c.id === chatActivo);
                const msg = chatObj.mensajes.find(m => m.idMsg === idHTML);
                if (msg) {
                    msg.copiado = true;
                    guardar(); // Cambia a verde en la PC y el Celular al mismo tiempo
                }
            });
        };

        // --- 5. UTILS ---
        window.switchearUsuario = function() {
            currentUser = (currentUser === 'potrillo') ? 'potrillo2' : 'potrillo';
            actualizarBotonUsuario();
            if (chatActivo) window.abrirChat(chatActivo); 
        };

        function actualizarBotonUsuario() {
            const btn = document.getElementById('id-btn');
            btn.innerText = (currentUser === 'potrillo') ? "🧑‍💻 1 (Móvil)" : "🧑‍💻 2 (PC)";
            btn.className = (currentUser === 'potrillo') ? "btn-identity active-me" : "btn-identity active-other";
        }

        // ESTA ES LA MAGIA: Subimos la data a Firebase en vez de a tu disco duro local
        function guardar() { 
            set(ref(db, 'proyectos'), chats);
        }

        function escapar(str) { return str.replace(/[&<>"']/g, m => ({'&': '&amp;','<': '&lt;','>': '&gt;','"': '&quot;',"'": '&#039;'}[m])); }

        // Atajos de teclado
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('code-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.enviarMensaje(); }
            });
            document.getElementById('pass').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') window.iniciarSesion();
            });
        });
    </script>
</body>
</html>
