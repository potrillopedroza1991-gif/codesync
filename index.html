<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja CodeSync Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-sidebar: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --me-blue: #1f6feb;
            --me-bg: #051d33;
            --other-bg: #21262d;
            --neon-green: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-dark); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
        }

        /* --- BARRA SUPERIOR (ESTILO GEMINI) --- */
        .mobile-header {
            display: none; /* Se oculta en PC */
            background: var(--bg-sidebar);
            padding: 15px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            gap: 15px;
            z-index: 10;
        }
        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
        }

        /* --- LOGIN --- */
        #login-screen {
            position: fixed; width: 100%; height: 100%; background: var(--bg-dark);
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- ESTRUCTURA PRINCIPAL --- */
        #app-screen { 
            display: none; 
            flex: 1; 
            flex-direction: row; 
            width: 100%;
            height: 100%;
        }

        /* SIDEBAR (EL MENÚ QUE SE ESCONDE) */
        .sidebar { 
            width: 280px; 
            background: var(--bg-sidebar); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 50;
        }

        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { 
            padding: 12px; border-radius: 8px; margin-bottom: 5px; cursor: pointer; 
            transition: 0.2s; border: 1px solid transparent; color: #8b949e;
        }
        .chat-item.activo { background: rgba(31, 111, 235, 0.1); border-color: var(--me-blue); color: white; }

        /* AREA DE CHAT */
        .main-chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

        /* BURBUJAS */
        .msg-row { display: flex; width: 100%; margin-bottom: 10px; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 85%; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); background: var(--other-bg); }
        .me .bubble { border-color: var(--me-blue); background: var(--me-bg); }
        pre { padding: 15px; font-size: 13px; overflow-x: auto; background: #010409; color: #e6edf3; }

        /* INPUT AREA */
        .input-area { padding: 15px; background: var(--bg-dark); display: flex; gap: 10px; border-top: 1px solid var(--border); }
        textarea { flex: 1; height: 50px; background: #161b22; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: white; resize: none; outline: none; }
        .btn-send { width: 55px; background: var(--me-blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; }

        /* --- CAPA OSCURA (MÓVIL) --- */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 40;
        }

        /* AJUSTES MÓVIL (TIPO GEMINI) */
        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar {
                position: fixed;
                left: 0; top: 0; height: 100%;
                transform: translateX(-100%); /* Escondido por defecto */
            }
            .sidebar.open { transform: translateX(0); }
            .overlay.open { display: block; }
            .bubble { max-width: 95%; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <div id="login-screen">
        <div class="ninja-logo"><i class="fas fa-user-ninja"></i></div>
        <h2>Entrar a CodeSync</h2>
        <div class="login-box">
            <input type="password" id="pass-input" placeholder="Contraseña secreta..." autocomplete="off">
            <button class="btn-login" onclick="login()"><i class="fas fa-key"></i> Entrar al Dojo</button>
        </div>
    </div>

    <div id="app-screen">
        
        <div class="sidebar" id="sidebar">
            <div style="padding: 20px; border-bottom: 1px solid var(--border); font-weight: bold; color: white;">
                <i class="fas fa-folder-open"></i> PROYECTOS
            </div>
            <div class="chat-list" id="chat-list">
                </div>
        </div>

        <div class="main-chat">
            
            <div class="mobile-header">
                <button class="menu-btn" id="menu-btn"><i class="fas fa-bars"></i></button>
                <span style="font-weight: bold; font-size: 18px;">Ninja CodeSync</span>
            </div>

            <div id="chat-area">
                </div>

            <div class="input-area">
                <textarea id="msg-input" placeholder="Pega tu código aquí..."></textarea>
                <button class="btn-send" onclick="enviarMensaje()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ==========================================
        // 1. PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE
        // ==========================================
        const firebaseConfig = {
            // Reemplaza esto con tus llaves reales de Firebase
            databaseURL: "https://codesync-pro-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==========================================
        // 2. LÓGICA DEL MENÚ MÓVIL (TIPO GEMINI)
        // ==========================================
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuBtn = document.getElementById('menu-btn');

        // Abrir menú al tocar las 3 rayitas
        menuBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            overlay.classList.add('open');
        });

        // Cerrar menú al tocar lo oscuro
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
        });

        // ==========================================
        // 3. IDENTIDAD Y LOGIN
        // ==========================================
        let myUser = "potrillo"; // Tu identidad principal
        let currentProyecto = "general"; // Proyecto por defecto

        function login() {
            let pass = document.getElementById('pass-input').value;
            if (pass === "12345") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                cargarMensajes();
            } else {
                alert("Contraseña incorrecta, intruso.");
            }
        }

        // ==========================================
        // 4. ENVIAR Y RECIBIR MENSAJES (SINC REAL)
        // ==========================================
        function enviarMensaje() {
            let txt = document.getElementById('msg-input').value.trim();
            if (txt === "") return;

            db.ref("proyectos/" + currentProyecto).push({
                user: myUser,
                text: txt,
                timestamp: Date.now()
            });

            document.getElementById('msg-input').value = ""; // Limpiar caja
        }

        function cargarMensajes() {
            let chatArea = document.getElementById('chat-area');
            
            db.ref("proyectos/" + currentProyecto).on("value", (snapshot) => {
                chatArea.innerHTML = ""; // Limpiar pantalla
                
                snapshot.forEach((child) => {
                    let msg = child.val();
                    let esMio = (msg.user === myUser) ? "me" : "other";
                    
                    let html = `
                        <div class="msg-row ${esMio}">
                            <div class="bubble">
                                <div class="bar-action code-header">
                                    <span><i class="fas fa-code"></i> ${msg.user}</span>
                                    <button class="btn-copy" onclick="copiarCodigo(this)">
                                        <i class="fas fa-copy"></i> Copiar
                                    </button>
                                </div>
                                <pre><code>${escapeHTML(msg.text)}</code></pre>
                            </div>
                        </div>
                    `;
                    chatArea.innerHTML += html;
                });
                
                // Bajar el scroll al último mensaje
                chatArea.scrollTop = chatArea.scrollHeight;
            });
        }

        // ==========================================
        // 5. FUNCIONES EXTRA (COPIAR Y ESCAPAR TEXTO)
        // ==========================================
        function copiarCodigo(btn) {
            let pre = btn.parentElement.nextElementSibling;
            let code = pre.innerText;
            navigator.clipboard.writeText(code).then(() => {
                btn.innerHTML = '<i class="fas fa-check"></i> Listo';
                btn.classList.add('copiado');
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-copy"></i> Copiar';
                    btn.classList.remove('copiado');
                }, 2000);
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }
    </script>
</body>
</html>
